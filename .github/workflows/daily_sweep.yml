name: Daily Carbon Market Sweep

on:
  schedule:
    - cron: '30 1 * * *'    # 1:30 UTC = 7:00am IST every day
  workflow_dispatch:          # allows manual trigger from GitHub UI

jobs:
  sweep:
    runs-on: ubuntu-latest

    permissions:
      contents: write         # needed to commit data/app.db back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run sweep
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CARBON_NONINTERACTIVE: "1"
        run: python main.py

      - name: Commit updated database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/app.db
          git diff --staged --quiet || git commit -m "Daily sweep $(date -u +%Y-%m-%d)"
          git push
